<style>
  body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: black;
  }

  .container {
    position: relative;
    width: 280px;
    height: 608px;
  }

  .container {
    position: relative;
    width: 280px;
    height:  608px;
    perspective: 800px;
    transform-style: preserve-3d;
    animation: rotateLoop 8s infinite linear;
  }

  @keyframes rotateLoop {
    0%   { transform: perspective(800px) rotateX(30deg) rotateY(-30deg); }
    25%  { transform: perspective(800px) rotateX(30deg) rotateY(30deg); }
    50%  { transform: perspective(800px) rotateX(-30deg) rotateY(30deg); }
    75%  { transform: perspective(800px) rotateX(-30deg) rotateY(-30deg); }
    100% { transform: perspective(800px) rotateX(30deg) rotateY(-30deg); }
  }

  .skeleton, .app {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
  }


  .divider {
    position: absolute;
    top: 0;
    width: 8px;
    height: 100%;
    background: linear-gradient(to bottom, #DCDFE0, #B7BBBE);
    z-index: 10;
  }

  @keyframes moveDivider {
    0%   { left: 0%; }
    50%  { left: calc(100% - 8px); }
    100% { left: 0%; }
  }

  @keyframes revealApp {
    0%   { clip-path: polygon(0 0, 0 0, 0 100%, 0 100%); }
    50%  { clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%); }
    100% { clip-path: polygon(0 0, 0 0, 0 100%, 0 100%); }
  }

  .divider {
    animation: moveDivider 4s infinite ease-in-out;
  }

  .divider {
    position: absolute;
    top: -20px;
    width: 8px;
    height: calc(100% + 40px);
    background: linear-gradient(to bottom, #DCDFE0, #B7BBBE);
    z-index: 10;
    animation: moveDivider 4s infinite ease-in-out;
  }

  .app {
    animation: revealApp 4s infinite ease-in-out;
  }

</style>
